<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sixtens Eventyr</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --grass:#8fc96a; --grass2:#7ab857; --leaf:#4e8b44; --leafdark:#37662f;
    --cream:#fff3da; --wood:#a9713f; --wooddark:#7c4f28;
    --berry:#e85d5d; --sun:#ffd262; --sky:#bfe6f0;
    --panel:#5b4632; --panel2:#493827; --ink:#3a2c1c;
    --hp:#6fce55; --hpbad:#e85d5d;
    --shadow:0 5px 0 rgba(58,44,28,.28);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Nunito',sans-serif; color:var(--cream);
    background:var(--leafdark); overflow:hidden; height:100vh; height:100dvh;
    display:flex; flex-direction:column;
  }
  .disp{font-family:'Fredoka',sans-serif;}
  .screen{position:fixed; inset:0; display:none; flex-direction:column;}
  .screen.on{display:flex;}
  button{font-family:'Fredoka',sans-serif; border:none; cursor:pointer; touch-action:manipulation;}

  /* ============ MAP SCREEN ============ */
  #mapScreen{background:#6fae52;}
  #mapHeader{
    position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:center; padding-top:calc(10px + env(safe-area-inset-top));
    pointer-events:none;
  }
  #mapHeader .plaque{
    background:var(--wood); border:3px solid var(--wooddark); border-radius:13px;
    padding:5px 16px 7px; box-shadow:var(--shadow); text-align:center;
  }
  #mapHeader h1{margin:0; font-size:19px; color:var(--cream); letter-spacing:1px; font-family:'Fredoka';}
  #mapHeader small{display:block; font-size:10px; font-weight:800; color:#e8d5b5;}
  #mapWrap{flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden;}
  #mapSvg{width:100%; height:100%; display:block;}
  .node{cursor:pointer;}
  .node .ring{transition:transform .15s;}
  .node:active .ring{transform:scale(.92);}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  .node.current .pulser{animation:pulse 1.4s ease-in-out infinite; transform-origin:center;}
  @keyframes cloudDrift{from{transform:translateX(-70px);}to{transform:translateX(470px);}}
  .cloud{animation:cloudDrift linear infinite;}
  @keyframes bobmark{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  #mapMarker .bobber{animation:bobmark 1.2s ease-in-out infinite;}
  @keyframes march{to{stroke-dashoffset:-16;}}
  .pathActive{animation:march .9s linear infinite;}
  @media (prefers-reduced-motion:reduce){
    .cloud,.node.current .pulser,#mapMarker .bobber,.pathActive{animation:none;}
  }
  #toast{
    position:absolute; left:50%; bottom:calc(26px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(120px);
    background:var(--panel); color:var(--cream); border:3px solid var(--wooddark);
    border-radius:14px; padding:10px 18px; font-weight:900; font-size:15px;
    box-shadow:var(--shadow); transition:transform .25s; z-index:9; text-align:center; max-width:86vw;
  }
  #toast.show{transform:translateX(-50%) translateY(0);}

  /* level intro card */
  .overlay{
    position:fixed; inset:0; background:rgba(38,28,16,.62); z-index:40;
    display:none; align-items:center; justify-content:center; padding:22px;
  }
  .overlay.on{display:flex;}
  .card{
    background:var(--cream); color:var(--ink); border-radius:22px; padding:22px 20px;
    width:min(360px,92vw); text-align:center; border:5px solid var(--wood);
    box-shadow:0 10px 0 rgba(0,0,0,.25);
  }
  .card h2{font-family:'Fredoka'; margin:0 0 4px; font-size:28px;}
  .card .lvltag{display:inline-block; background:var(--sun); border-radius:999px; padding:3px 14px;
    font-weight:900; font-size:13px; margin-bottom:8px; color:var(--ink);}
  .card p{margin:6px 0 14px; font-weight:800; font-size:15px; line-height:1.45;}
  .bigbtn{
    display:inline-block; background:var(--berry); color:#fff; font-size:22px; font-weight:700;
    padding:12px 34px; border-radius:16px; box-shadow:0 5px 0 #b23a3a; letter-spacing:.5px;
  }
  .bigbtn:active{transform:translateY(3px); box-shadow:0 2px 0 #b23a3a;}
  .bigbtn.green{background:var(--hp); box-shadow:0 5px 0 #4c9a38;}
  .bigbtn.green:active{box-shadow:0 2px 0 #4c9a38;}
  .card .foes{display:flex; justify-content:center; gap:10px; margin:10px 0 14px; flex-wrap:nowrap;}
  .card .foes .foe{width:64px; min-width:0;}
  .card .foes .foe svg{width:100%; height:auto;}
  .card .foes .fname{font-size:11px; font-weight:900; margin-top:2px;}

  /* ============ LEVEL SCREEN ============ */
  #levelScreen{background:var(--sky);}
  #stage{position:relative; flex:1; overflow:hidden;}
  #stageSky{position:absolute; inset:0;}
  .layer{position:absolute; left:0; top:0; height:100%; width:max-content; display:flex;}
  .layer svg{height:100%; width:auto; flex:none;}
  @keyframes scrollFar{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  #layerFar{animation:scrollFar 26s linear infinite;}
  #layerMid{animation:scrollFar 11s linear infinite;}
  #layerGround{animation:scrollFar 7s linear infinite;}
  #stage.paused #layerFar,#stage.paused #layerMid,#stage.paused #layerGround{animation-play-state:paused;}
  @media (prefers-reduced-motion:reduce){
    #layerFar,#layerMid,#layerGround{animation-duration:60s;}
  }

  /* HUD */
  #hud{
    position:absolute; top:calc(8px + env(safe-area-inset-top)); left:10px; right:10px; z-index:6;
    display:flex; align-items:center; gap:10px;
  }
  #hpBox{
    background:rgba(255,243,218,.94); border:3px solid var(--wood); border-radius:999px;
    display:flex; align-items:center; gap:8px; padding:4px 12px 4px 6px; flex:1; max-width:250px;
  }
  #hpFace{width:32px;height:32px;flex:none;}
  #hpBar{flex:1; height:14px; background:#d8c6a4; border-radius:999px; overflow:hidden;}
  #hpFill{height:100%; width:100%; background:var(--hp); border-radius:999px; transition:width .3s, background .3s;}
  #encDots{margin-left:auto; background:rgba(255,243,218,.94); border:3px solid var(--wood);
    border-radius:999px; padding:5px 12px; font-size:16px; letter-spacing:3px;}
  #encDots .done{opacity:.32; filter:grayscale(1);}
  #lvlName{
    position:absolute; top:calc(52px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-family:'Fredoka'; font-size:15px; color:#5a4630; background:rgba(255,243,218,.8);
    padding:2px 14px; border-radius:999px; z-index:5; font-weight:600;
  }

  /* actors */
  #hero{position:absolute; bottom:12%; left:12%; width:110px; z-index:4; transition:transform .2s;}
  #hero svg{width:100%; height:auto; overflow:visible;}
  @keyframes heroBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  .walking #hero{animation:heroBob .45s ease-in-out infinite;}
  @keyframes legA{0%,100%{transform:rotate(24deg);}50%{transform:rotate(-24deg);}}
  @keyframes legB{0%,100%{transform:rotate(-24deg);}50%{transform:rotate(24deg);}}
  .walking .legF{animation:legA .45s ease-in-out infinite; transform-origin:50px 86px;}
  .walking .legB2{animation:legB .45s ease-in-out infinite; transform-origin:40px 86px;}
  .walking .armF{animation:legB .45s ease-in-out infinite; transform-origin:54px 56px;}
  @keyframes hurtFlash{0%,100%{filter:none;}30%{filter:brightness(1.6) saturate(2) hue-rotate(-30deg);}}
  .hurt{animation:hurtFlash .4s ease;}
  @keyframes swingArm{0%{transform:rotate(0);}22%{transform:rotate(-55deg);}55%{transform:rotate(24deg);}100%{transform:rotate(0);}}
  #hero.attack .armF{animation:swingArm .45s ease; transform-origin:54px 56px;}
  @keyframes heroLunge{0%,100%{transform:translateX(0);}45%{transform:translateX(14px);}}
  #hero.attack{animation:heroLunge .45s ease;}
  @keyframes capeWave{0%,100%{transform:rotate(0);}50%{transform:rotate(6deg);}}
  .walking .cape{animation:capeWave .9s ease-in-out infinite; transform-origin:47px 52px;}
  @keyframes shakeX{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}
  .shake{animation:shakeX .3s ease;}

  #monster{position:absolute; bottom:13%; right:-40%; width:130px; z-index:4; transition:right .8s cubic-bezier(.2,.8,.3,1);}
  #monster.boss{width:190px;}
  #monster.in{right:8%;}
  #monster svg{width:100%; height:auto; overflow:visible;}
  @keyframes monIdle{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-6px) scale(1.02);}}
  #monster .idler{animation:monIdle 1.6s ease-in-out infinite; transform-origin:center bottom;}
  @keyframes poofAnim{
    0%{transform:scale(1); opacity:1;}
    30%{transform:scale(1.18,.65); opacity:1;}
    100%{transform:scale(0,.05) translateY(30px); opacity:0;}
  }
  #monster.faint{animation:poofAnim .45s ease-in forwards; transform-origin:center bottom;}
  @keyframes flyout{
    from{transform:translate(-50%,-50%) scale(1); opacity:1;}
    to{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.3); opacity:0;}
  }
  .poofStar{position:absolute; z-index:6; pointer-events:none; font-size:24px;
    animation:flyout .7s ease-out forwards;}
  @keyframes bossLunge{0%,100%{transform:translateX(0);}40%{transform:translateX(-60px) scale(1.06);}}
  #monster.lunge{animation:bossLunge .5s ease;}
  @media (prefers-reduced-motion:reduce){
    .walking #hero,.walking .legF,.walking .legB2,.walking .armF,.walking .cape,#monster .idler{animation:none;}
  }

  /* battle panel */
  #battlePanel{
    position:relative; background:var(--panel); border-top:6px solid var(--wooddark);
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));
    height:calc(296px + env(safe-area-inset-bottom)); z-index:7;
  }
  #walkCover{
    position:absolute; inset:0; z-index:3; background:var(--panel);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fredoka'; font-size:19px; color:#e8d5b5; letter-spacing:.5px;
  }
  @keyframes stomp{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  #walkCover .boot{display:inline-block; margin-right:8px; animation:stomp .45s ease-in-out infinite;}
  #battlePanel.battle #walkCover{display:none;}
  @media (prefers-reduced-motion:reduce){#walkCover .boot{animation:none;}}
  #monRow{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  #monName{font-family:'Fredoka'; font-size:18px; color:var(--sun);}
  #monPips{display:flex; gap:6px;}
  .pip{width:16px;height:16px;border-radius:50%;background:var(--berry);border:2px solid #8f3030;}
  .pip.off{background:#3d3126;border-color:#2c231b;}
  #bossMeterWrap{visibility:hidden; margin:4px 0 6px;}
  #bossMeterWrap.on{visibility:visible;}
  #bossMeterLabel{font-size:11px; font-weight:900; color:#f2c48d; margin-bottom:2px;}
  #bossMeter{height:10px; background:#3d3126; border-radius:999px; overflow:hidden;}
  #bossFill{height:100%; width:0%; background:linear-gradient(90deg,#ff9d3d,#ff5470); border-radius:999px;}
  #question{
    text-align:center; font-family:'Fredoka'; font-weight:700; font-size:44px; color:#fff;
    margin:2px 0 10px; text-shadow:0 3px 0 rgba(0,0,0,.3); line-height:1.1;
  }
  #answers{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .ansBtn{
    background:var(--cream); color:var(--ink); font-size:30px; font-weight:700;
    padding:14px 0; border-radius:16px; box-shadow:0 5px 0 #c9b493;
  }
  .ansBtn:active{transform:translateY(3px); box-shadow:0 2px 0 #c9b493;}
  .ansBtn.good{background:var(--hp); color:#fff; box-shadow:0 5px 0 #4c9a38;}
  .ansBtn.bad{background:var(--berry); color:#fff; box-shadow:0 5px 0 #b23a3a;}
  #feedback{
    position:absolute; left:50%; top:34%; transform:translate(-50%,-50%) scale(0); z-index:8;
    font-family:'Fredoka'; font-weight:700; font-size:52px; color:#fff;
    text-shadow:0 4px 0 rgba(0,0,0,.35); pointer-events:none; white-space:nowrap;
  }
  @keyframes popFb{0%{transform:translate(-50%,-50%) scale(0);}45%{transform:translate(-50%,-50%) scale(1.15);}70%{transform:translate(-50%,-50%) scale(1);}100%{transform:translate(-50%,-50%) scale(1); opacity:0;}}
  #feedback.pop{animation:popFb .9s ease forwards;}

  #exitBtn{margin-left:8px; background:rgba(255,243,218,.94); border:3px solid var(--wood);
    border-radius:50%; width:40px; height:40px; font-size:17px; line-height:1; padding:0; flex:none;}
  #muteBtn{position:absolute; top:calc(10px + env(safe-area-inset-top)); right:10px; z-index:6;
    background:var(--wood); border:3px solid var(--wooddark); border-radius:50%;
    width:42px; height:42px; font-size:17px; padding:0; box-shadow:var(--shadow);}
  @media (max-height:640px){
    #battlePanel{height:calc(258px + env(safe-area-inset-bottom));}
    #question{font-size:34px; margin:0 0 6px;}
    .ansBtn{font-size:24px; padding:10px 0;}
    #monName{font-size:15px;}
  }

  /* confetti */
  .confetti{position:fixed; top:-12px; z-index:60; font-size:22px; pointer-events:none;
    animation:confFall linear forwards;}
  @keyframes confFall{to{transform:translateY(110vh) rotate(540deg);}}
</style>
</head>
<body>

<!-- ================= MAP ================= -->
<div class="screen on" id="mapScreen">
  <div id="mapHeader">
    <div class="plaque">
      <h1>Sixtens Eventyr</h1>
      <small>Vejen hjem til huset 🏠</small>
    </div>
  </div>
  <button id="muteBtn" aria-label="Lyd til/fra">🔊</button>
  <div id="mapWrap"></div>
  <div id="toast"></div>
</div>

<!-- ================= LEVEL ================= -->
<div class="screen" id="levelScreen">
  <div id="stage">
    <div id="stageSky"></div>
    <div class="layer" id="layerFar"></div>
    <div class="layer" id="layerMid"></div>
    <div class="layer" id="layerGround"></div>
    <div id="hud">
      <div id="hpBox">
        <svg id="hpFace" viewBox="0 0 40 40">
          <circle cx="20" cy="22" r="14" fill="#ffd9b3"/>
          <path d="M6 20 Q8 6 20 6 Q32 6 34 20 L34 16 Q32 10 26 11 Q20 4 12 12 Q7 13 6 20 Z" fill="#ffdf7e"/>
          <circle cx="15" cy="22" r="2.4" fill="#3b82f6"/><circle cx="25" cy="22" r="2.4" fill="#3b82f6"/>
          <path d="M15 29 Q20 32 25 29" stroke="#a15c2f" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
        <div id="hpBar"><div id="hpFill"></div></div>
      </div>
      <div id="encDots"></div>
      <button id="exitBtn" aria-label="Tilbage til kortet">🗺️</button>
    </div>
    <div id="lvlName"></div>
    <div id="hero"></div>
    <div id="monster"></div>
    <div id="feedback"></div>
  </div>
  <div id="battlePanel">
    <div id="walkCover"><span class="boot">🥾</span> Sixten er på vej…</div>
    <div id="monRow">
      <div id="monName"></div>
      <div id="monPips"></div>
    </div>
    <div id="bossMeterWrap">
      <div id="bossMeterLabel">⚡ Bossen lader op! Svar før den angriber!</div>
      <div id="bossMeter"><div id="bossFill"></div></div>
    </div>
    <div id="question"></div>
    <div id="answers"></div>
  </div>
</div>

<!-- ================= OVERLAYS ================= -->
<div class="overlay" id="introOverlay">
  <div class="card">
    <span class="lvltag" id="introTag"></span>
    <h2 id="introName"></h2>
    <p id="introDesc"></p>
    <div class="foes" id="introFoes"></div>
    <button class="bigbtn" id="introStart">Start! ⚔️</button>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="card">
    <h2>⭐ Banen er klaret! ⭐</h2>
    <p id="winText"></p>
    <button class="bigbtn green" id="winBtn">Tilbage til kortet 🗺️</button>
  </div>
</div>

<div class="overlay" id="loseOverlay">
  <div class="card">
    <h2>Uh åh! 😵</h2>
    <p>Sixten skal lige puste ud.<br>Monstrene venter stadig – prøv igen!</p>
    <button class="bigbtn" id="loseBtn">Prøv igen 💪</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================
   SIXTENS EVENTYR – framework + Bane 1 (Garagen)
   Math logic reused from Monster Lab:
   25% plus, 25% minus, 50% gange. Answer-first generation,
   no repeated problem twice in a row, 4 unique options.
========================================================= */
const $=s=>document.querySelector(s);

/* ---------- lyd ---------- */
let AC=null;
function ac(){
  if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  if(AC && AC.state==="suspended"){ try{AC.resume();}catch(e){} }
  return AC;
}
function tone(f,t,dur,type,vol){
  if(mem.muted) return;
  const c=ac(); if(!c)return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||"triangle"; o.frequency.value=f;
  g.gain.setValueAtTime(vol||.18,c.currentTime+t);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+t+dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+t); o.stop(c.currentTime+t+dur+.05);
}
const sfx={
  tap(){tone(440,0,.08,"triangle",.1);},
  good(){tone(523,0,.12); tone(784,.1,.18);},
  bad(){tone(160,0,.25,"square",.12);},
  faint(){tone(600,0,.1); tone(400,.1,.1); tone(250,.2,.25);},
  boss(){tone(110,0,.4,"sawtooth",.14); tone(90,.15,.4,"sawtooth",.12);},
  win(){[523,659,784,1047].forEach((f,i)=>tone(f,i*.13,.22));},
  step(){tone(300,0,.05,"triangle",.05);}
};

/* ---------- gem/indlæs ---------- */
const KEY="sixten-eventyr-v1";
let mem={completed:[], muted:false};
async function load(){
  try{
    if(window.storage){
      const r=await window.storage.get(KEY);
      if(r&&r.value){ mem=JSON.parse(r.value); }
    }
  }catch(e){/* første gang – intet gemt */}
  if(!mem||!Array.isArray(mem.completed)) mem={completed:[], muted:false};
  if(typeof mem.muted!=="boolean") mem.muted=false;
}
async function save(){
  try{ if(window.storage) await window.storage.set(KEY,JSON.stringify(mem)); }catch(e){}
}

/* ---------- matematik (samme logik som Monster Lab) ---------- */
const rint=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
let lastProblem="";
function makeProblem(diff){
  // Fast blanding: 25% plus, 25% minus, 50% gange.
  const ops=["add","sub","mul","mul"];
  let ans,txt,tries=0;
  do{
    const op=ops[Math.floor(Math.random()*4)];
    if(op==="add"){
      ans=rint(3, 8+diff*3);
      const a=rint(1,ans-1), b=ans-a;
      txt=a+" + "+b;
    }else if(op==="sub"){
      ans=rint(0, 5+diff*2);
      const b=rint(1, 4+diff), a=ans+b;
      txt=a+" − "+b;
    }else{
      const a=rint(1, Math.min(2+diff,10)), b=rint(1, Math.min(3+diff,10));
      ans=a*b;
      txt=a+" × "+b;
    }
    tries++;
  }while(txt===lastProblem && tries<25);
  lastProblem=txt;
  return {txt,ans};
}
function makeOptions(ans){
  const set=new Set([ans]); let guard=0;
  while(set.size<4 && guard++<300){
    const d=ans+rint(-4,4)+(Math.random()<.2?rint(-8,8):0);
    if(d>=0 && d!==ans && Math.abs(d-ans)<=12) set.add(d);
  }
  let k=1;
  while(set.size<4){ if(!set.has(ans+k)) set.add(ans+k); k++; }
  return shuffle([...set]);
}

/* ---------- SIXTEN sprite: lille ridder i ghibli-stil (sideprofil mod højre) ---------- */
function sixtenSVG(){
  return '<svg viewBox="0 0 96 120">'
  +'<ellipse cx="47" cy="115" rx="23" ry="4" fill="rgba(0,0,0,.15)"/>'
  /* flagrende kappe */
  +'<g class="cape"><path d="M47 50 Q29 52 23 66 Q16 80 15 98 Q21 94 25 99 Q29 92 33 97 Q37 90 41 93 Q44 82 46 76 Q48 62 47 50 Z" fill="#c9463f"/>'
  +'<path d="M45 54 Q33 58 28 70 Q24 80 23 90 Q30 78 36 72 Q42 64 45 54 Z" fill="#d9605a" opacity=".65"/></g>'
  /* bagerste ben med støvle */
  +'<g class="legB2"><rect x="35" y="84" width="10" height="20" rx="5" fill="#4a5878"/>'
  +'<path d="M33 100 h15 a5 5 0 0 1 5 5 v3 h-20 z" fill="#5a3d22"/>'
  +'<rect x="34" y="97" width="12" height="5" rx="2.5" fill="#6e4a2a"/></g>'
  /* forreste ben med støvle */

function rseed(n){ n=(n*9301+49297)%233280; return Math.floor((n/233280)*100000); }
function currentLevelIndex(){
  for(let i=0;i<LEVELS.length;i++){ if(!mem.completed.includes(LEVELS[i].id)) return i; }
  return LEVELS.length-1;
}

let toastT=null;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("show");},2200);
}

function nodeTap(i){
  sfx.tap();
  const cur=currentLevelIndex(), lv=LEVELS[i];
  if(i>cur){ toast("🔒 Gennemfør bane "+(cur+1)+" først!"); return; }
  if(!lv.built){ toast("🔨 Denne bane bygges stadig – kom snart igen!"); return; }
  showIntro(lv);
}

/* ---------- level-intro ---------- */
let activeLevel=null;
function showIntro(lv){
  activeLevel=lv;
  $("#introTag").textContent="Bane "+lv.id;
  $("#introName").textContent=lv.icon+" "+lv.name;
  $("#introDesc").textContent=lv.desc;
  const foes=$("#introFoes"); foes.innerHTML="";
  (lv.encounters||[]).forEach(function(k){
    const m=MONSTERS[k];
    const d=document.createElement("div"); d.className="foe";
    d.innerHTML=m.svg()+'<div class="fname">'+(m.boss?"👑 ":"")+m.name+'</div>';
    foes.appendChild(d);
  });
  $("#introOverlay").classList.add("on");
}
$("#introStart").addEventListener("click",function(){
  sfx.tap();
  $("#introOverlay").classList.remove("on");
  startLevel(activeLevel);
});

const LEVEL_BG={garage:bgGarage, trampolin:bgTrampolin, forhave:bgForhave, legeplads:bgLegeplads, baghave:bgBaghave, hus:bgHus};

/* ---------- LEVEL ENGINE ---------- */
const game={hp:100, enc:0, lv:null, monsterKey:null, hitsLeft:0, inBattle:false,
  bossTimer:null, bossFillPct:0, locked:false, timeouts:[], stepper:null};
/* level-timeouts, der kan ryddes samlet (retry/exit) */
function gt(fn,ms){ const id=setTimeout(fn,ms); game.timeouts.push(id); return id; }
function clearLevelTimers(){
  game.timeouts.forEach(clearTimeout); game.timeouts=[];
  if(game.stepper){ clearInterval(game.stepper); game.stepper=null; }
  stopBossTimer();
}

function startLevel(lv){
  clearLevelTimers();
  game.lv=lv; game.hp=100; game.enc=0; game.inBattle=false; game.locked=false;
  (LEVEL_BG[lv.key]||bgGarage)();
  $("#stage").classList.remove("walking","paused");
  $("#lvlName").textContent="Bane "+lv.id+" · "+lv.name;
  $("#hero").innerHTML=sixtenSVG();
  $("#monster").className=""; $("#monster").innerHTML="";
  $("#battlePanel").classList.remove("battle");
  updateHP(); updateEncDots();
  $("#mapScreen").classList.remove("on");
  $("#levelScreen").classList.add("on");
  walkThenEncounter();
}

function updateHP(){
  const f=$("#hpFill");
  f.style.width=game.hp+"%";
  f.style.background=game.hp>35?"var(--hp)":"var(--hpbad)";
}
function updateEncDots(){
  $("#encDots").innerHTML=game.lv.encounters.map(function(k,i){
    const ic=MONSTERS[k].boss?"👑":"👾";
    return '<span class="'+(i<game.enc?"done":"")+'">'+ic+'</span>';
  }).join("");
}

function walkThenEncounter(){
  const st=$("#stage");
  if(game.lv.key==="hus" && game.enc>0){
    const floors=["","1. sal","2. sal","SKYGGEKONGEN"];
    $("#walkCover").innerHTML='<span class="boot">🪜</span> Sixten går op til '+floors[game.enc]+'…';
  }else{
    $("#walkCover").innerHTML='<span class="boot">🥾</span> Sixten er på vej…';
  }
  st.classList.add("walking"); st.classList.remove("paused");
  game.stepper=setInterval(function(){ sfx.step(); },450);
  gt(function(){
    if(game.stepper){ clearInterval(game.stepper); game.stepper=null; }
    st.classList.remove("walking"); st.classList.add("paused");
    spawnMonster();
  }, 2800);
}

function spawnMonster(){
  const key=game.lv.encounters[game.enc];
  const m=MONSTERS[key];
  game.monsterKey=key; game.hitsLeft=m.hits; game.inBattle=true; game.locked=false;
  const mon=$("#monster");
  mon.className=m.boss?"boss":"";
  mon.innerHTML=m.svg();
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ mon.classList.add("in"); }); });
  if(m.boss){ sfx.boss(); feedback("BOSS! 👑"); }
  $("#monName").textContent=(m.boss?"👑 BOSS: ":"")+m.name;
  renderPips();
  $("#bossMeterWrap").classList.toggle("on",!!m.boss);
  $("#bossFill").style.width="0%";
  gt(function(){
    $("#battlePanel").classList.add("battle");
    newQuestion();
    if(m.boss) startBossTimer();
  }, 700);
}

function renderPips(){
  const m=MONSTERS[game.monsterKey];
  let s="";
  for(let i=0;i<m.hits;i++) s+='<div class="pip'+(i<m.hits-game.hitsLeft?" off":"")+'"></div>';
  $("#monPips").innerHTML=s;
}

function newQuestion(){
  const m=MONSTERS[game.monsterKey];
  const diff=game.lv.diff+(m.boss?1:0);   // boss = lidt sværere
  const p=makeProblem(diff);
  $("#question").textContent=p.txt+" = ?";
  const opts=makeOptions(p.ans);
  const box=$("#answers"); box.innerHTML="";
  opts.forEach(function(o){
    const b=document.createElement("button");
    b.className="ansBtn"; b.textContent=o;
    b.addEventListener("click",function(){ answer(b,o===p.ans); });
    box.appendChild(b);
  });
}

function feedback(txt){
  const f=$("#feedback");
  f.textContent=txt; f.classList.remove("pop");
  void f.offsetWidth; f.classList.add("pop");
}

function answer(btn,ok){
  if(game.locked||!game.inBattle) return;
  game.locked=true;
  const m=MONSTERS[game.monsterKey];
  if(ok){
    sfx.good(); btn.classList.add("good");
    feedback(["Sådan! 💥","Flot! ⚡","BAM! 🌟","Godt gået! 💪"][rint(0,3)]);
    const h=$("#hero");
    h.classList.remove("attack"); void h.offsetWidth; h.classList.add("attack");
    $("#monster").classList.add("shake");
    setTimeout(function(){$("#monster").classList.remove("shake");},350);
    game.hitsLeft--;
    renderPips();
    if(m.boss){ game.bossFillPct=0; $("#bossFill").style.width="0%"; }
    if(game.hitsLeft<=0){ game.inBattle=false; stopBossTimer(); gt(defeatMonster,500); }
    else gt(function(){ game.locked=false; newQuestion(); },600);
  }else{
    sfx.bad(); btn.classList.add("bad");
    feedback("Av! 💢");
    hurtHero(10);
    if(game.hp<=0) return;
    gt(function(){ game.locked=false; newQuestion(); },600);
  }
}

function hurtHero(dmg){
  game.hp=Math.max(0,game.hp-dmg);
  updateHP();
  const h=$("#hero");
  h.classList.remove("hurt","shake"); void h.offsetWidth; h.classList.add("hurt","shake");
  if(game.hp<=0){
    stopBossTimer(); game.inBattle=false;
    gt(function(){ $("#loseOverlay").classList.add("on"); },600);
  }
}

function poof(){
  const st=$("#stage"), mon=$("#monster");
  const sr=st.getBoundingClientRect(), mr=mon.getBoundingClientRect();
  const cx=mr.left-sr.left+mr.width/2, cy=mr.top-sr.top+mr.height/2;
  const em=["⭐","✨","💨","💥","⭐"];
  for(let i=0;i<10;i++){
    const d=document.createElement("div");
    d.className="poofStar"; d.textContent=em[rint(0,em.length-1)];
    const ang=Math.random()*Math.PI*2, dist=40+Math.random()*70;
    d.style.left=cx+"px"; d.style.top=cy+"px";
    d.style.setProperty("--dx",(Math.cos(ang)*dist)+"px");
    d.style.setProperty("--dy",(Math.sin(ang)*dist-30)+"px");
    d.style.animationDuration=(0.45+Math.random()*0.35)+"s";
    st.appendChild(d);
    setTimeout(function(){d.remove();},1200);
  }
}

function defeatMonster(){
  const m=MONSTERS[game.monsterKey];
  game.inBattle=false;
  stopBossTimer();
  sfx.faint();
  poof();
  $("#monster").classList.add("faint");
  $("#battlePanel").classList.remove("battle");
  game.enc++;
  /* lille pusterum: Sixten heler 10% efter hver sejr */
  if(game.hp<100){ game.hp=Math.min(100,game.hp+10); updateHP(); }
  updateEncDots();
  gt(function(){
    $("#monster").className=""; $("#monster").innerHTML="";
    if(game.enc>=game.lv.encounters.length){ levelClear(); }
    else walkThenEncounter();
  }, 900);
}

/* boss-mekanik: opladnings-angreb */
function startBossTimer(){
  game.bossFillPct=0; $("#bossFill").style.width="0%";
  stopBossTimer();
  const secs=MONSTERS[game.monsterKey].charge||10;
  game.bossTimer=setInterval(function(){
    if(!game.inBattle){ stopBossTimer(); return; }
    if(game.locked) return; /* fair: bossen lader ikke op mens svar-animationen kører */
    game.bossFillPct+=100/(secs*10); // fuld på `secs` sek (interval 100 ms)
    if(game.bossFillPct>=100){
      game.bossFillPct=0;
      $("#monster").classList.remove("lunge"); void $("#monster").offsetWidth;
      $("#monster").classList.add("lunge");
      sfx.boss();
      feedback("BOSS-ANGREB! 🔥");
      hurtHero(10);
    }
    $("#bossFill").style.width=game.bossFillPct+"%";
  },100);
}
function stopBossTimer(){ if(game.bossTimer){ clearInterval(game.bossTimer); game.bossTimer=null; } }

function levelClear(){
  sfx.win();
  const wasNew=!mem.completed.includes(game.lv.id);
  if(wasNew) mem.completed.push(game.lv.id);
  save();
  confetti();
  const allDone=LEVELS.every(function(l){return mem.completed.includes(l.id);});
  if(allDone && wasNew){
    confetti();
    $("#winText").innerHTML="\ud83c\udfc6 SIXTEN HAR KLARET ALLE BANER! \ud83c\udfc6<br>Skyggekongen er besejret, og hele haven og huset er reddet. Du er en \u00e6gte matematik-helt!";
  }else if(wasNew){
    $("#winText").innerHTML="Sixten ryddede <b>"+game.lv.name+"</b>!<br>Ruten p\u00e5 kortet er blevet l\u00e6ngere. \ud83c\udf89";
  }else{
    $("#winText").innerHTML="<b>"+game.lv.name+"</b> klaret \u2013 igen!<br>Sikke en genspils-sejr! \u2b50";
  }
  gt(function(){ $("#winOverlay").classList.add("on"); },700);
}
function confetti(){
  const em=["⭐","🎉","✨","💥","🟡","🟢"];
  for(let i=0;i<26;i++){
    const d=document.createElement("div");
    d.className="confetti";
    d.textContent=em[rint(0,em.length-1)];
    d.style.left=rint(2,96)+"vw";
    d.style.animationDuration=(1.4+Math.random()*1.6)+"s";
    d.style.animationDelay=(Math.random()*0.5)+"s";
    document.body.appendChild(d);
    setTimeout(function(){d.remove();},3600);
  }
}

$("#winBtn").addEventListener("click",function(){
  sfx.tap();
  $("#winOverlay").classList.remove("on");
  $("#levelScreen").classList.remove("on");
  $("#mapScreen").classList.add("on");
  buildMap();
});
$("#loseBtn").addEventListener("click",function(){
  sfx.tap();
  $("#loseOverlay").classList.remove("on");
  startLevel(game.lv);
});

/* forlad banen og gå tilbage til kortet */
function exitLevel(){
  clearLevelTimers();
  game.inBattle=false; game.locked=true;
  $("#winOverlay").classList.remove("on");
  $("#loseOverlay").classList.remove("on");
  $("#levelScreen").classList.remove("on");
  $("#mapScreen").classList.add("on");
  buildMap();
}
$("#exitBtn").addEventListener("click",function(){ sfx.tap(); exitLevel(); });
$("#muteBtn").addEventListener("click",function(){
  mem.muted=!mem.muted;
  this.textContent=mem.muted?"🔇":"🔊";
  save();
  sfx.tap(); /* giver kun lyd, når der tændes */
});

/* ---------- init ---------- */
document.body.addEventListener("touchstart",function(){ac();},{once:true});
document.body.addEventListener("click",function(){ac();},{once:true});
load().then(function(){
  buildMap();
  $("#muteBtn").textContent=mem.muted?"🔇":"🔊";
});
</script>
